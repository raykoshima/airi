version: '3.9'

services:
  airi:
    image: node:20-alpine
    container_name: airi
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "corepack enable && pnpm install && pnpm build && pnpm start"
    environment:
      - NODE_ENV=production
    ports:
      - '4005:3000'
    restart: unless-stopped
